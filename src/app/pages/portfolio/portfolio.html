<!-- ─── PAGE HEADER ─────────────────────────────────────── -->
<div class="page-header">
    <div class="container">
      <div class="overline">My Work</div>
      <h1 style="font-size:clamp(2rem,6vw,3.5rem);font-weight:900;letter-spacing:-.04em;margin-bottom:1rem;">Portfolio</h1>
      <p style="color:var(--text-muted);font-size:1.05rem;max-width:560px;margin:0 auto;line-height:1.7;">
        A selection of projects I've built for clients and as personal ventures. Each one solved a real problem with clean, maintainable code.
      </p>
    </div>
  </div>

  <!-- ─── FILTERS ─────────────────────────────────────────── -->
  <div class="filters-bar">
    <div class="container">
      <div class="filters-inner">
        <button type="button" class="filter-btn active" data-filter="all">All</button>
        <button type="button" class="filter-btn" data-filter="Web App">Web App</button>
        <button type="button" class="filter-btn" data-filter="Mobile">Mobile</button>
        <button type="button" class="filter-btn" data-filter="Backend">Backend</button>
        <button type="button" class="filter-btn" data-filter="AI">AI</button>
      </div>
    </div>
  </div>

  <!-- ─── PROJECTS GRID ───────────────────────────────────── -->
  <section class="section">
    <div class="container">
      <div class="projects-grid" id="projectsGrid">

        <!-- Project 1 -->
        <div class="project-card" *ngFor="let project of projects" (click)="openModal(project)">
        
          <div class="project-img-wrap">
            <img [src]="project.image" [alt]="project.title" class="project-img" loading="lazy" />
        
            <!-- <div style="position:absolute;top:.75rem;right:.75rem;z-index:2;">
              <span class="badge">{{ project.category }}</span>
            </div> -->
          </div>
        
          <div class="project-body">
            <h3 class="project-title">{{ project.title }}</h3>
        
            <p class="project-desc">
              {{ project.description }}
            </p>
        
            <div class="project-tags">
              <span class="badge" *ngFor="let tech of project.technologies">
                {{ tech }}
              </span>
            </div>

          </div>
        
        </div>

      </div>
    </div>
  </section>
